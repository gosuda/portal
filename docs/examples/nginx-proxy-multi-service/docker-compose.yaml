# Portal relay + multiple services — docker compose deployment example.
#
# This example shows how to run Portal alongside other web services
# behind a single nginx instance on the same host.
#
# Architecture:
#   nginx:443 (L4 stream, ssl_preread)
#     ├─ portal.example.com    → host.docker.internal:4017  (TLS passthrough, admin/API)
#     ├─ *.portal.example.com  → host.docker.internal:4443  (TLS passthrough, tenant SNI)
#     └─ everything else       → nginx:8443   (L7, TLS termination)
#           ├─ app-a.example.com → app-a-frontend:3000 / app-a-api:8000
#           └─ app-b.example.com → app-b-frontend:3000 / app-b-api:8001
#
# Prerequisites:
#   1. Copy .env.example to .env and set all required values.
#   2. Place TLS certificates in ./certs/:
#        - Portal root-domain certs: either managed by portal (set ACME_DNS_PROVIDER)
#          or mounted manually into ./.portal-certs as fullchain.pem/privatekey.pem
#        - Other services: app_a_fullchain.pem, app_a_privkey.pem, etc.
#   3. Create the .portal-certs directory with correct ownership (UID 65532 = nonroot in distroless):
#        mkdir -p ./.portal-certs
#        sudo chown 65532:65532 ./.portal-certs
#        chmod 755 ./.portal-certs
#   4. Start all services:
#        docker compose up -d

services:

  # ─── nginx ──────────────────────────────────────────────────────────────────
  # Single entry point for all traffic (ports 80/443).
  # Routes portal traffic via L4 SNI passthrough.
  # Terminates TLS and proxies for all other services via L7.
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/certs:ro
    depends_on:
      - app-a-api
      - app-a-frontend
    restart: unless-stopped
    networks:
      - default
      - app-a-network
      - app-b-network

  # ─── portal relay ───────────────────────────────────────────────────────────
  # NAT-traversal relay server.
  # TCP (4017, 4443) is reached by nginx via host.docker.internal.
  # SNI_PORT is 4443 to avoid conflicting with nginx on 443.
  # If you enable relay-peer discovery overlay, expose DISCOVERY_PORT/udp as well.
  # If you enable UDP (UDP_PORT_COUNT > 0), expose SNI_PORT/udp and 50000+/udp as well.
  portal:
    image: ghcr.io/gosuda/portal:latest
    container_name: portal
    ports:
      - "${API_PORT:-4017}:${API_PORT:-4017}/tcp"
      - "${SNI_PORT:-4443}:${SNI_PORT:-4443}/tcp"
      - "${DISCOVERY_PORT:-51820}:${DISCOVERY_PORT:-51820}/udp"
      # Uncomment below when enabling UDP transport (host 443/udp is free — nginx only uses 443/tcp):
      # - "443:${SNI_PORT:-4443}/udp"
      # - "50000-50009:50000-50009/udp"  # adjust range to match UDP_PORT_COUNT
    stop_grace_period: 30s
    environment:
      PORTAL_URL: ${PORTAL_URL:-https://portal.example.com}
      API_PORT: ${API_PORT:-4017}
      SNI_PORT: ${SNI_PORT:-4443}
      IDENTITY_PATH: ${IDENTITY_PATH:-/portal-certs/identity.json}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:-}
      DISCOVERY_PORT: ${DISCOVERY_PORT:-51820}
      WIREGUARD_ENDPOINT: ${WIREGUARD_ENDPOINT:-}
      UDP_PORT_COUNT: ${UDP_PORT_COUNT:-0}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-127.0.0.0/8}
      KEYLESS_DIR: ${KEYLESS_DIR:-/portal-certs}
      ACME_DNS_PROVIDER: ${ACME_DNS_PROVIDER:-}
      ENS_GASLESS_ENABLED: ${ENS_GASLESS_ENABLED:-false}
      CLOUDFLARE_TOKEN: ${CLOUDFLARE_TOKEN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_HOSTED_ZONE_ID: ${AWS_HOSTED_ZONE_ID:-}
      AWS_DNSSEC_KMS_KEY_ARN: ${AWS_DNSSEC_KMS_KEY_ARN:-}
      DNSSEC_KSK_NAME: ${DNSSEC_KSK_NAME:-}
    volumes:
      - ./.portal-certs:${KEYLESS_DIR:-/portal-certs}
    restart: unless-stopped

  # ─── App A: backend ─────────────────────────────────────────────────────────
  # Replace with your actual backend service image and config.
  app-a-api:
    image: your-registry/app-a-api:latest
    container_name: app-a-api
    # environment:
    #   - DATABASE_URL=...
    restart: unless-stopped
    networks:
      - app-a-network

  # ─── App A: frontend ────────────────────────────────────────────────────────
  app-a-frontend:
    image: your-registry/app-a-frontend:latest
    container_name: app-a-frontend
    restart: unless-stopped
    networks:
      - app-a-network
    depends_on:
      - app-a-api

  # ─── App B: backend ─────────────────────────────────────────────────────────
  # Replace with your actual backend service image and config.
  app-b-api:
    image: your-registry/app-b-api:latest
    container_name: app-b-api
    restart: unless-stopped
    networks:
      - app-b-network

  # ─── App B: frontend ────────────────────────────────────────────────────────
  app-b-frontend:
    image: your-registry/app-b-frontend:latest
    container_name: app-b-frontend
    restart: unless-stopped
    networks:
      - app-b-network
    depends_on:
      - app-b-api

networks:
  app-a-network:
    driver: bridge
  app-b-network:
    driver: bridge
