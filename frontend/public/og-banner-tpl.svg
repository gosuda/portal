<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" style="background:#0b1120;">
  <!-- Graphic for a tunneling tool connecting Localhost to Public URL -->
  <defs>
    <style>
      .glow { filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.6)); }
      .glow-pink { filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.6)); }
      .move-packet { animation: move 2.5s linear infinite; }
      @keyframes move {
        0% { transform: translateX(0); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateX(450px); opacity: 0; }
      }
    </style>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    
    <!-- OFFICIAL GO GOPHER SVG -->
    <g id="official-gopher">
      <g transform="translate(-108, -145)">
        <path fill="#8CC5E7" d="M207.3,44.6c-6.7-13.7-22.9-1.6-27-5.9c-21-21.6-46.4-27-66.3-28c0,0-9,0-11,0c-20,0.5-45.4,6.3-66.3,28 c-4.1,4.3-20.4-7.8-27,5.9c-7.7,16,15.7,17.6,14.5,24.7c-2.3,12.8-0.8,31.8,1,50.5C28,151.5,4.3,227.4,53.6,257.9 c9.3,5.8,34.4,9,56.2,9.5l0,0c0,0,0.1,0,0.1,0c0,0,0.1,0,0.1,0l0,0c21.8-0.5,43.9-3.7,53.2-9.5c49.4-30.5,25.7-106.4,28.6-138.1 c1.7-18.7,3.2-37.7,1-50.5C191.6,62.2,215,60.5,207.3,44.6z"/>
        <g>
          <path fill="#E0DEDC" d="M143.2,54.3c-33.4,3.9-28.9,38.7-16,50c24,21,49,0,46.2-21.2C170.9,62.7,153.6,53.1,143.2,54.3z"/>
          <circle fill="#111212" cx="145.5" cy="84.3" r="11.4"/>
          <circle fill="#FFFFFF" cx="142.5" cy="79.4" r="3.6"/>
        </g>
        <g>
          <path fill="#B8937F" d="M108.5,107c-16,2.4-21.7,7-20.5,14.2c2,11.8,39.7,10.5,40.9,0.6C129.9,113.3,114.8,106.1,108.5,107z"/>
          <path fill="#111212" d="M98.2,111.8c-2.7,9.8,21.7,8.3,21.1,2c-0.3-3.7-3.6-8.4-12.3-8.2C103.6,105.7,99.4,107.2,98.2,111.8z"/>
          <path fill="#E0DEDC" d="M99,127.7c-0.9,0.4-2.4,10.2,2.2,10.7c3.1,0.3,11.6,1.3,13.6,0c3.9-2.5,3.5-8.5,1.3-10 C112.4,126,100,127.2,99,127.7z"/>
        </g>
        <g>
          <path fill="#E0DEDC" d="M73.6,54.3c33.4,3.9,28.9,38.7,16,50c-24,21-49,0-46.2-21.2C46,62.7,63.3,53.1,73.6,54.3z"/>
          <circle fill="#111212" cx="71.4" cy="84.3" r="11.4"/>
          <circle fill="#FFFFFF" cx="74.4" cy="79.4" r="3.6"/>
        </g>
        <path fill="#B8937F" d="M193.6,186.7c11,0.1,5.6-23.5-1.2-18.8c-3.3,2.3-3.9,7.6-3.9,12.1C188.5,182.5,190.5,186.6,193.6,186.7z"/>
        <path fill="#B8937F" d="M23.3,186.7c-11,0.1-5.6-23.5,1.2-18.8c3.3,2.3,3.9,7.6,3.9,12.1C28.4,182.5,26.4,186.6,23.3,186.7z"/>
        <path fill="#B8937F" d="M172.7,259.2c-6-8.9-11.4-2-20.1,2.4c-4.1,2.1,6.8,9.6,19,4C174.8,264.1,174.7,262.1,172.7,259.2z"/>
        <path fill="#B8937F" d="M44.2,260.2c6-8.9,11.4-2,20.1,2.4c4.1,2.1-6.8,9.6-19,4C42.1,265.1,42.2,263.1,44.2,260.2z"/>
        <path fill="#3C89BF" d="M188.6,47c-0.6,2.1,2.1,1.8,3.1,8.3c0.4,2.4,9-3.5,5.5-7.8C194.3,43.9,189.1,44.9,188.6,47z"/>
        <path fill="#3C89BF" d="M28.3,47c0.6,2.1-2.1,1.8-3.1,8.3c-0.4,2.4-9-3.5-5.5-7.8C22.5,43.9,27.7,44.9,28.3,47z"/>
      </g>
    </g>
  </defs>
  
  <rect width="1200" height="400" fill="url(#grid)" />
  
  <!-- Left Side: Local Environment -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="250" height="200" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="125" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Local Environment</text>
    <rect x="50" y="80" width="150" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" class="glow" />
    <text x="125" y="115" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">localhost:3000</text>
    <text x="125" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Development Server</text>
  </g>

  <!-- Right Side: Public Internet -->
  <g transform="translate(800, 100)">
    <rect x="0" y="0" width="250" height="200" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="125" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">Public Internet</text>
    <rect x="50" y="80" width="150" height="80" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="2" class="glow-pink" />
    
    <!-- === BACKEND GO TEMPLATE VARIABLE HERE === -->
    <!-- 백엔드에서 text/template 을 사용해 이 부분을 동적으로 치환합니다 -->
    <text x="125" y="115" font-family="monospace" font-size="14" fill="#f472b6" text-anchor="middle">https://{{.Host}}</text>
    
    <text x="125" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Public URL</text>
  </g>

  <!-- The Portal Tunnel -->
  <g transform="translate(400, 150)">
    <!-- Base connection lines -->
    <path d="M 0 50 L 400 50" stroke="#334155" stroke-width="4" stroke-dasharray="10 5" fill="none" />
    <!-- Gradient glowing tunnel line -->
    <path d="M 0 50 L 400 50" stroke="url(#link)" stroke-width="12" stroke-linecap="round" fill="none" class="glow" opacity="0.6"/>
    
    <!-- Animated Gophers Flying through the Tunnel -->
    <g class="move-packet">
      <use href="#official-gopher" transform="translate(-25, 50) scale(0.18) rotate(35)" />
    </g>
    <g class="move-packet" style="animation-delay: 0.83s;">
      <use href="#official-gopher" transform="translate(-25, 50) scale(0.18) rotate(35)" />
    </g>
    <g class="move-packet" style="animation-delay: 1.66s;">
      <use href="#official-gopher" transform="translate(-25, 50) scale(0.18) rotate(35)" />
    </g>

    <!-- Center Icon / Logo representing the tool -->
    <circle cx="200" cy="50" r="45" fill="#0f172a" stroke="#818cf8" stroke-width="4" />
    <ellipse cx="185" cy="50" rx="8" ry="20" fill="none" stroke="#38bdf8" stroke-width="3" />
    <ellipse cx="215" cy="50" rx="8" ry="20" fill="none" stroke="#f472b6" stroke-width="3" />
    <path d="M 185 50 L 215 50" stroke="#ffffff" stroke-width="3" stroke-dasharray="4 3" stroke-linecap="round" />
  </g>

  <!-- Title / Tagline at bottom -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="900" fill="#f8fafc" letter-spacing="-1" text-anchor="middle">Portal by Gosuda</text>
  <text x="600" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Secure tunneling from local development to the world</text>
</svg>
