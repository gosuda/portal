<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Transform your local services into web-accessible endpoints. Instant access from anywhere."
    />
    <meta property="og:title" content="[%OG_TITLE%]" />
    <meta property="og:description" content="[%OG_DESCRIPTION%]" />
    <meta property="og:image" content="[%OG_IMAGE_URL%]" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="[%OG_TITLE%]" />
    <meta name="twitter:description" content="[%OG_DESCRIPTION%]" />
    <meta name="twitter:image" content="[%OG_IMAGE_URL%]" />
    <meta name="portal-release-version" content="[%RELEASE_VERSION%]" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Portal - Local to web. Instant access.</title>
    <script>
      (() => {
        const defaultTheme = "light";

        try {
          const storedTheme = localStorage.getItem("theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : defaultTheme;

          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.style.colorScheme = defaultTheme;
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
