<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Demo App</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Portal Demo</p>
      <h1>Relay-backed demo application</h1>
      <p>Use this page to verify static assets, cookies, fetches, and websocket echo.</p>
    </header>

    <section class="card">
      <h2>HTTP</h2>
      <button id="ping">Fetch /api/ping</button>
      <button id="cookies">Set cookies</button>
      <pre id="output">Ready.</pre>
    </section>

    <section class="card">
      <h2>WebSocket</h2>
      <input id="ws-input" value="hello portal">
      <button id="ws-send">Send</button>
      <pre id="ws-output">Disconnected.</pre>
    </section>
  </main>

  <script>
    const output = document.getElementById('output');
    const wsOutput = document.getElementById('ws-output');

    document.getElementById('ping').addEventListener('click', async () => {
      const res = await fetch('/api/ping');
      output.textContent = JSON.stringify(await res.json(), null, 2);
    });

    document.getElementById('cookies').addEventListener('click', async () => {
      const res = await fetch('/api/test-cookies');
      output.textContent = JSON.stringify(await res.json(), null, 2);
    });

    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    const ws = new WebSocket(proto + location.host + '/ws');
    ws.onopen = () => { wsOutput.textContent = 'Connected.'; };
    ws.onmessage = (event) => { wsOutput.textContent = event.data; };
    ws.onclose = () => { wsOutput.textContent = 'Disconnected.'; };

    document.getElementById('ws-send').addEventListener('click', () => {
      ws.send(document.getElementById('ws-input').value);
    });
  </script>
</body>
</html>
