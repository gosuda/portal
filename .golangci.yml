version: "2"

run:
  tests: true
  go: "1.26"

formatters:
  enable: [goimports]
  settings:
    goimports:
      local-prefixes: [github.com/gosuda, gosuda.org]

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - errorlint
    - copyloopvar
    - nilerr
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - durationcheck
    - noctx
    - wastedassign

  exclusions:
    paths:
      - ^frontend/node_modules/
      - ^cmd/relay-server/dist/
    rules:
      - linters: [errcheck]
        source: "^\\s*defer\\s+"
      - path: "_test\\.go"
        linters: [bodyclose, errcheck, noctx]

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Print
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Sprintf
        - os.Unsetenv
        - encoding/json.Marshal
        - encoding/json.Unmarshal
        - io.Copy
        - log.Printf
        - log.Println
        - log.Print
        - time.Now
        - time.Sleep

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
