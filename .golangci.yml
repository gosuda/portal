version: "2"

run:
  tests: true
  go: "1.26"

formatters:
  enable: [goimports]
  settings:
    goimports:
      local-prefixes: [github.com/gosuda, gosuda.org]

linters:
  default: standard
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - errorlint
    - copyloopvar
    - nilerr
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - durationcheck
    - makezero
    - noctx
    - wastedassign
    - misspell
    - whitespace
    - godot
    - usestdlibvars
    - testifylint
    - usetesting
    - containedctx
    - prealloc
    - intrange
    - fatcontext
    - perfsprint
    - reassign
    - mirror

  exclusions:
    paths:
      - ^cmd/relay-server/frontend/node_modules/
      - ^cmd/relay-server/dist/
    rules:
      - linters: [errcheck]
        source: "^\\s*defer\\s+"
      - path: "_test\\.go"
        linters: [bodyclose, errcheck, noctx, wrapcheck, funlen, dupl]

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Print
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Sprintf
        - os.Unsetenv
        - encoding/json.Marshal
        - encoding/json.Unmarshal
        - io.Copy
        - log.Printf
        - log.Println
        - log.Print
        - time.Now
        - time.Sleep
        - sync.Mutex.Lock
        - sync.Mutex.Unlock
        - sync.RWMutex.RLock
        - sync.RWMutex.RUnlock

    govet:
      enable-all: true

    perfsprint:
      strconcat: true

    fatcontext:
      check-struct-pointers: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
