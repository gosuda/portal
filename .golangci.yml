version: "2"

run:
  tests: true
  go: "1.26"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/gosuda
        - gosuda.org

linters:
  default: none

  enable:
    # CI blockers: correctness + security
    - govet
    - errcheck
    - staticcheck
    - unused
    - errorlint
    - copyloopvar
    - noctx

  exclusions:
    rules:
      - linters:
          - errcheck
        source: "^\\s*defer\\s+"
      - path: "_test\\.go"
        linters:
          - errcheck
          - noctx

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Print
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Sprintf
        - os.Unsetenv
        - encoding/json.Marshal
        - encoding/json.Unmarshal
        - encoding/json.NewEncoder
        - encoding/json.NewDecoder
        - strings.Builder.WriteString
        - strings.Builder.Write
        - bytes.Buffer.Write
        - bytes.Buffer.WriteString
        - io.Copy
        - log.Printf
        - log.Println
        - log.Print
        - time.Now
        - time.Sleep
        - sync.Mutex.Lock
        - sync.Mutex.Unlock
        - sync.RWMutex.RLock
        - sync.RWMutex.RUnlock
        - atomic.AddInt64
        - atomic.StoreInt64
        - atomic.LoadInt64
        - rand.Read

    govet:
      enable-all: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
