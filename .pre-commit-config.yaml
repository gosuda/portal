minimum_pre_commit_version: "3.5.0"

repos:
  # General text cleanup for markdown files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace

      # Ensure files end with a newline
      - id: end-of-file-fixer

      # Fix mixed line endings (convert to LF)
      - id: mixed-line-ending
        args: ["--fix=lf"]

      # Fix UTF-8 byte order marker
      - id: fix-byte-order-marker

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.6.2
    hooks:
      - id: golangci-lint-config-verify
        name: golangci-lint-config-verify
        description: Verifies the configuration file
        entry: golangci-lint config verify
        files: '\.golangci\.(?:yml|yaml|toml|json)'
        language: golang

  - repo: local
    hooks:
      - id: make-fmt
        name: make fmt
        description: Formats Go source code with gofmt and goimports.
        entry: make fmt
        types: [go]
        language: system
        pass_filenames: false

      - id: go-vet
        name: go vet
        description: Runs go vet checks.
        entry: go vet ./...
        types: [go]
        language: system
        pass_filenames: false
